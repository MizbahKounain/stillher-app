<!DOCTYPE html>
<html>
<head>
    <title>StillHer</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff7eb3, #ff758c, #6a11cb, #2575fc);
            background-size: 300% 300%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            color: white;
            animation: fadeIn 1.5s ease;
        }

        h1 {
            font-size: 70px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .highlight {
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.8);
        }

        button {
            padding: 14px 30px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            background: white;
            color: #333;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        button:hover {
            transform: scale(1.1);
            background: #000;
            color: white;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1><span class="highlight">StillHer</span></h1>

    <a href="/login-page">
        <button>Get Started</button>
    </a>
</div>

</body>
</html>
